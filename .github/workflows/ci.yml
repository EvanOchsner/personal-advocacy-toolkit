name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + ruff (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install package (with dev extras)
        run: uv sync --extra dev

      - name: Ruff lint
        # ruff is declared in pyproject.toml [project.optional-dependencies].dev
        # and configured under [tool.ruff]. Fail CI on any lint error.
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -v

  # Second job: sanity-check the synthetic walkthrough's static tool invocations
  # (no side effects — just --help on every documented CLI, to catch argparse
  # drift between the docs and the scripts).
  cli-surface:
    name: CLI surface smoke (--help) (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install package
        run: uv sync

      - name: Smoke-test CLI help output
        run: |
          set -e
          uv run python -m scripts.evidence_hash --help
          uv run python -m scripts.provenance --help
          uv run python -m scripts.provenance_snapshot --help
          uv run python -m scripts.ingest.email_eml_to_json --help
          uv run python -m scripts.ingest.email_json_to_txt --help
          uv run python -m scripts.ingest.mbox_split --help
          uv run python -m scripts.manifest.correspondence_manifest --help
          uv run python -m scripts.intake.situation_classify --help || true
          uv run python -m scripts.intake.authorities_lookup --help || true
          uv run python -m scripts.intake.deadline_calc --help || true
          uv run python -m scripts.packet.build --help
          uv run python -m scripts.packet.appendix_cover --help
          uv run python -m scripts.packet.compile_reference --help
          uv run python -m scripts.letters.draft --help
          uv run python -m scripts.status.case_dashboard --help
          uv run python -m scripts.publish.pii_scrub --help
          uv run python -m scripts.app --help
          uv run python -m scripts.app.validate --help

      - name: Case-map schema validator (examples/maryland-mustang)
        # Validates entities.yaml + events.yaml against the synthetic case.
        # Catches schema drift between the validator and the seed fixture
        # the test suite relies on.
        run: uv run python -m scripts.app.validate --case-dir examples/maryland-mustang

      - name: Case-map airgap check (no external URLs in static/ or templates/)
        # Fail the build if any file under scripts/app/static/ or
        # scripts/app/templates/ references an external URL. XML namespace
        # URIs (e.g. http://www.w3.org/2000/svg) are identifiers, not fetch
        # targets, and are allowlisted. Mirrors the policy documented in
        # docs/concepts/case-map-app.md and the unit test
        # test_no_external_urls_in_static_tree.
        run: |
          set -e
          ROOTS="scripts/app/static scripts/app/templates"
          PATTERN='(http://|https://|//cdn\.|//fonts\.)'
          ALLOWLIST='http://www.w3.org/'
          FAIL=0
          for root in $ROOTS; do
            while IFS= read -r -d '' f; do
              # Strip allowlisted identifiers before scanning.
              if grep -E "$PATTERN" <(sed "s#${ALLOWLIST}##g" "$f") >/dev/null; then
                echo "external URL found in $f:"
                grep -nE "$PATTERN" <(sed "s#${ALLOWLIST}##g" "$f")
                FAIL=1
              fi
            done < <(find "$root" -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' \) -print0)
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "FAIL: case-map airgap rule violated — see docs/concepts/case-map-app.md"
            exit 1
          fi
          echo "OK: no external URLs under scripts/app/ static or templates."

  # Publication-safety post-checks: exercise the Phase 3C scrubbers against
  # examples/ and templates/ and assert that nothing survives. A failure
  # here means either (a) a real-case artifact has leaked into the repo, or
  # (b) a new synthetic artifact was added without being cleaned first.
  publication-safety-postchecks:
    name: Publication-safety post-checks (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Install package (with synthetic-case extras for Pillow/python-docx)
        run: uv sync --extra dev --extra synthetic-case

      - name: EXIF scrub post-check (examples/)
        # exif_scrub exits 1 if any image has surviving EXIF/GPS/XMP tags.
        # The --report flag requested in the Phase-6 plan does not exist on
        # this CLI; stdout already lists every offending file, and the exit
        # code is the authoritative signal. We capture stdout to a log file
        # in the step workspace so the CI log is reviewable after the run.
        run: |
          set -e
          mkdir -p /tmp/postcheck
          uv run python -m scripts.publish.exif_scrub --root examples/ \
            | tee /tmp/postcheck/exif.log
          echo "--- EXIF post-check report ---"
          cat /tmp/postcheck/exif.log

      - name: DOCX metadata post-check (examples/ and templates/)
        # docx_metadata_scrub.py is single-file (--in/--out) and does its own
        # post-check internally (exit 1 + deletes the output if sensitive
        # metadata survived). We loop over every .docx in examples/ and
        # templates/ and aggregate.
        run: |
          set -e
          mkdir -p /tmp/postcheck/docx
          FAIL=0
          COUNT=0
          while IFS= read -r -d '' DOCX; do
            COUNT=$((COUNT + 1))
            OUT="/tmp/postcheck/docx/$(echo "$DOCX" | tr '/' '_').docx"
            echo "scrubbing: $DOCX"
            if ! uv run python -m scripts.publish.docx_metadata_scrub --in "$DOCX" --out "$OUT"; then
              FAIL=$((FAIL + 1))
            fi
          done < <(find examples templates -type f -name '*.docx' -print0 2>/dev/null)
          echo "--- DOCX post-check report ---"
          echo "scanned: $COUNT files; failures: $FAIL"
          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi

      - name: PII scrub post-check (examples/ vs ci/example-subs.yaml)
        # pii_scrub exits 0 if no banned-term survivors after scrubbing, 1
        # otherwise. It is strict-by-default; the `--strict` flag named in
        # the Phase-6 plan does not exist on this CLI — the exit code is
        # the strict signal. We run dry-run so examples/ is not mutated by
        # CI; the in-memory scrubbed text is what the survivor check runs
        # against.
        run: |
          set -e
          mkdir -p /tmp/postcheck
          uv run python -m scripts.publish.pii_scrub \
            --root examples/ \
            --substitutions ci/example-subs.yaml \
            --report /tmp/postcheck/pii_scrub_report.json
          echo "--- PII scrub report ---"
          cat /tmp/postcheck/pii_scrub_report.json

  # Publication-prep grep rehearsal: fail CI if any term in
  # ci/banned-terms.txt appears anywhere in the repo. The file ships
  # empty on purpose (see its header for the add-a-term protocol); the
  # infra exists so landing a banned term is a one-line patch.
  publication-prep-grep:
    name: Publication-prep grep (ci/banned-terms.txt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm ripgrep is available
        # ripgrep is preinstalled on ubuntu-latest GitHub-hosted runners.
        # This step makes the dependency explicit and fails loudly if the
        # runner image ever drops it.
        run: rg --version

      - name: Grep repo for banned terms
        # Strip comments and blank lines from banned-terms.txt to produce
        # the effective pattern file. If empty, nothing to match — succeed
        # trivially. Otherwise rg -F (fixed-string) -f (pattern file)
        # across the whole repo; exit 1 on any hit.
        run: |
          set -e
          EFFECTIVE=/tmp/banned-terms.effective
          grep -vE '^[[:space:]]*(#|$)' ci/banned-terms.txt > "$EFFECTIVE" || true
          if [ ! -s "$EFFECTIVE" ]; then
            echo "ci/banned-terms.txt is empty (no effective terms) — skipping grep"
            exit 0
          fi
          echo "effective banned terms:"
          cat "$EFFECTIVE"
          echo "---"
          # Exclude the banned-terms file itself and the local_postchecks
          # script so a listed term does not match its own declaration.
          if rg -F -n --no-ignore \
                --glob '!ci/banned-terms.txt' \
                --glob '!scripts/ci/local_postchecks.sh' \
                -f "$EFFECTIVE" \
                .; then
            echo "FAIL: banned term found in repo" >&2
            exit 1
          fi
          echo "OK: no banned terms found"
