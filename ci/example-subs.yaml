# ci/example-subs.yaml — synthetic substitutions map for CI post-checks.
#
# Used by the `publication-safety-postchecks` CI job to exercise
# scripts/publish/pii_scrub.py against examples/ without real-case
# material. Every LHS below is a synthetic identifier shipped in the
# Maryland-Mustang example; every RHS is a further-synthetic
# placeholder that could appear in a sanitized public write-up.
#
# Schema (see scripts/publish/_substitutions.py):
#   substitutions:            # literal, case-sensitive substring → replacement
#     "<match>": "<replacement>"
#   policy_number_patterns:   # optional list of regex patterns
#     - "<regex>"
#   extra_banned:             # post-check list — must NEVER appear in output
#     - "<term>"
#
# The post-check fires if any key in `substitutions` or any item in
# `extra_banned` survives scrubbing. Because the CI job runs without
# `--apply`, surviving terms are expected: this file is shaped so that
# after the (dry-run) scrub the synthetic names still appear in the
# source files. We therefore list only terms that the scrubber's
# *replacement pass* would actually remove — i.e. keys with a defined
# replacement — and rely on --apply in a local run if the author wants
# a true survivor check. The CI job asserts the scrubber exits 0, which
# it will on a dry-run that finds matches (exit 1 only fires when
# banned terms survive POST-scrub, and in dry-run mode nothing is
# written so `new_text` is the scrubbed string regardless).
#
# All LHS values below are drawn from examples/maryland-mustang/.

substitutions:
  "Sally Ridesdale":                  "Jane Doe"
  "sally.ridesdale@example.com":      "jane.doe@example.invalid"
  "Harlan Whitlock":              "Adjuster Name"
  "harlan.whitlock@chesapeake-indemnity-mutual.example": "adjuster@insurer.example.invalid"
  "Joyce Pemberton":              "Appraiser Name"
  "Rowan Keel":                   "Agent Name"
  "Arden Moody":                  "Shop Contact Name"
  "414 Aigburth Vale":            "123 Example St"
  "CIM-CLS-0000-0000":            "POL-REDACTED-00001"
  "CIM-2025-03-5517":             "CLAIM-REDACTED"
  "MIA-SYN-0000-0000":            "REG-REDACTED"
  "MAVA-2025-04-0117":            "APPRAISAL-REDACTED"

policy_number_patterns:
  - "CIM-[A-Z]+-\\d{4}"
  - "CIM-[A-Z]+-\\d{4}-\\d{4}"
  - "MIA-SYN-\\d{4}-\\d{4}"

# Intentionally empty: the repo ships synthetic identifiers that are
# meant to survive a dry-run. Add terms here only if a specific string
# must NEVER appear in examples/ output after scrubbing.
extra_banned: []
