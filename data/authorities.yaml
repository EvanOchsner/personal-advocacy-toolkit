  MD:
    label: "Maryland"
    situations:
      insurance_dispute:
        status: populated
        authorities:
          - name: "Maryland Insurance Administration"
            short_name: "MIA"
            kind: "regulator"
            url: "https://insurance.maryland.gov/Consumer/Pages/FileAComplaint.aspx"
            notes: |
              Primary state regulator for insurers licensed in Maryland.
              Handles complaints about claim handling, coverage disputes,
              and unfair claim-settlement practices. This is reference
              information, not legal advice — verify with counsel.
          - name: "Maryland Office of the Attorney General — Consumer Protection Division"
            short_name: "MD AG CPD"
            kind: "ag"
            url: "https://www.marylandattorneygeneral.gov/Pages/CPD/"
            notes: |
              Parallel avenue for unfair-and-deceptive-practices claims
              that overlap with the insurance-specific complaint.
          - name: "Maryland State Bar Association — Lawyer Referral"
            short_name: "MSBA Referral"
            kind: "bar"
            url: "https://www.msba.org/public/find-a-lawyer/"
            notes: |
              Referral service for locating counsel. Useful if the
              dispute appears to require litigation. This is reference
