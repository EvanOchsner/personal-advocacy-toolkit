# authorities.yaml — jurisdiction x situation -> authorities shortlist
#
# Reference material, not legal advice. Lists regulators, ombuds offices,
# and resources that plausibly have jurisdiction over a situation. Use
# with scripts/intake/authorities_lookup.py.
#
# Schema (v0.1):
#   schema_version: str
#   jurisdictions:
#     <jurisdiction_slug>:        # e.g. "MD", "federal", "CA"
#       label: str
#       situations:
#         <situation_slug>:       # matches data/situation_types.yaml slug
#           status: populated | stub
#           authorities:
#             - name: str
#               short_name: str
#               kind: str         # regulator | ombud | bar | ag | federal | nonprofit
#               url: str
#               notes: str        # when to use; include "verify" disclaimer where relevant
#
# Federal authorities are placed under jurisdictions.federal and are
# returned *in addition* to state-level results for any lookup.

schema_version: "0.1"

jurisdictions:

  federal:
    label: "Federal (applies across U.S. jurisdictions)"
    situations:
      insurance_dispute:
        status: populated
        authorities:
          - name: "Consumer Financial Protection Bureau"
            short_name: "CFPB"
            kind: "federal"
            url: "https://www.consumerfinance.gov/complaint/"
            notes: |
              Primarily for financial products (not most P&C insurance),
              but useful for lender-placed insurance and related consumer
              finance issues. Verify jurisdictional fit with counsel.
          - name: "Federal Trade Commission — ReportFraud"
            short_name: "FTC ReportFraud"
            kind: "federal"
            url: "https://reportfraud.ftc.gov/"
            notes: |
              For deceptive practices that may accompany an insurance
              dispute. Not a regulator of the insurance contract itself.
