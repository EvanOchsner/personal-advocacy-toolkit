# situation_types.yaml — canonical situation taxonomy
#
# Each entry defines a slug (machine key) + human label + a minimal set of
# router questions used by scripts/intake/situation_classify.py to map a
# user's answers to a situation_type. This file is reference material, not
# legal advice. See docs/concepts/ for the narrative.
#
# Schema (v0.1):
#   schema_version: str
#   situations:
#     - slug: str                  # machine key, used in other data files
#       label: str                 # human-readable
#       description: str
#       subtypes: [str]            # optional list of slugs
#       playbook: str | null       # path to playbook doc (may be TODO)
#       router_answers:            # classifier inputs that route *to* this slug
#         counterparty_kind: [str] # one-of match: insurer, landlord, etc.
#         keywords: [str]          # any substring match in free-text "situation" answer
#       status: "populated" | "stub"
#
# The classifier is a simple rules engine: if an answer's
# counterparty_kind matches and/or any keyword appears in the free-text
# "situation" field, we pick the highest-priority match. Ties break on
# list order. A "fallback" slug with status=stub is returned if nothing
# matches.

schema_version: "0.1"

situations:
  - slug: insurance_dispute
    label: "Insurance dispute (coverage / claim / bad faith)"
    description: |
      Dispute with a first- or third-party insurer over coverage,
      valuation, claim handling, or settlement timing. Examples include
      auto total-loss valuation, homeowner denial, health-insurance
      coverage denials, and delayed claim payments.
    subtypes:
      - auto_total_loss_bad_faith
      - homeowner_denial
      - health_coverage_denial
      - delayed_payment
    playbook: "docs/playbooks/insurance-dispute.md"  # TODO: populate
    router_answers:
      counterparty_kind: ["insurer", "insurance_company"]
      keywords:
        - "insurance"
        - "insurer"
        - "claim denied"
        - "total loss"
        - "bad faith"
        - "adjuster"
        - "coverage"
        - "policy"
    status: populated

