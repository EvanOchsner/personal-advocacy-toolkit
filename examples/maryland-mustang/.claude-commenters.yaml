# Map commenter identity (as it appears in a .docx comment's
# author / initials field) to a role. Roles tune specialist reply
# tone. See .claude/skills/docx-comment-roundtrip/SKILL.md for the rule table.
commenters:
  - match:
      author: "Elena Rojas"
    role: lawyer
  - match:
      author: "MIA Intake"
    role: regulator
  - match:
      author: "Carlos Mendez"
      initials: "CM"
    role: opposing-counsel
  - match:
      author: "Sally Ridesdale"
    role: complainant
  - match:
      author: "Claude"
    role: self
default_role: unknown
