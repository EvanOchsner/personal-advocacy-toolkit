# events.yaml — Mustang in Maryland (SYNTHETIC — NOT A REAL CASE)
#
# Timeline events for the case-map app, tagged by entity ID so the UI
# can filter when an entity is selected. Derived from the `timeline:`
# block in case-facts.yaml, but with entity tags added.
#
# Evidence-manifest entries are intentionally NOT represented here;
# evidence appears in the drilldown panel via `refs:` but not on the
# timeline. Correspondence is pulled live from the correspondence
# manifest at render time, not duplicated here.

events:
